<header>
  <div class="left-side">
    <ng-container *ngIf="isMobile">
      <app-sidebar-toggle />
    </ng-container>

    <h4>{{ pageTitle }}</h4>
  </div>

  <ng-container *ngIf="isMobile; else desktopHeader">
    <app-mobile-header />
  </ng-container>

  <ng-template #desktopHeader>
    <app-desktop-header />
  </ng-template>
</header>
