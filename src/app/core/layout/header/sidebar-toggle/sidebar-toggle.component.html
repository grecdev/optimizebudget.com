<button class="sidebar-toggle-btn" type="button" (click)="handleSidebarToggle($event)">
  <div class="bar top" [@topBarAnimation]="sidebarOpen ? 'open' : 'closed'"></div>
  <div class="bar mid" [@middleBarAnimation]="sidebarOpen ? 'open' : 'closed'"></div>
  <div class="bar bottom" [@bottomBarAnimation]="sidebarOpen ? 'open' : 'closed'"></div>
</button>
