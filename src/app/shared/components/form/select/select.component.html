<div class="select-value-container">
  <div class="label">Some label</div>

  <div class="current-value"></div>

  <app-icon svgIcon="caret-down" *ngIf="!focused; else caretUp" />

  <ng-template #caretUp>
    <app-icon svgIcon="caret-up" />
  </ng-template>
</div>

<ng-template #selectOptionsContainer>
  <div class="select-options-container">
    <ng-content></ng-content>
  </div>
</ng-template>
