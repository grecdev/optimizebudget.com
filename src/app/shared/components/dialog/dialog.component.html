<div id="dialog-overlay-content">
  <div class="header">
    <h2>{{ title }}</h2>

    <button
      type="button"
      appIconButton
      *ngIf="closeButton"
      (click)="handleButtonCloseClick($event)"
    >
      <app-icon [svgIcon]="icons['xmark']" />
    </button>
  </div>

  <div id="body">
    <ng-content></ng-content>
  </div>
</div>
