<form>
  <div class="form-inputs-container">
    <app-form-field
      variant="outlined"
      color="primary-default"
      [labelOptions]="{
        position: 'top',
      }"
    >
      <app-input-label>Expense name</app-input-label>

      <input
        appInput
        id="expense-name"
        type="text"
        name="expense-name"
        placeholder="Expense name"
      />
    </app-form-field>

    <app-form-field
      variant="outlined"
      color="primary-default"
      [labelOptions]="{
        position: 'top',
      }"
    >
      <app-input-label>Vendor name</app-input-label>

      <input
        appInput
        id="vendor-name"
        type="text"
        name="vendor-name"
        placeholder="Vendor name"
      />
    </app-form-field>

    <app-form-field
      variant="outlined"
      color="primary-default"
      [labelOptions]="{
        position: 'top',
      }"
    >
      <app-input-label>Category</app-input-label>

      <app-select id="category-select">
        <app-select-option>Option 1</app-select-option>
        <app-select-option>Option 2</app-select-option>
        <app-select-option>Option 3</app-select-option>
        <app-select-option>Option 4</app-select-option>
        <app-select-option>Option 5</app-select-option>
        <app-select-option>Option 6</app-select-option>
      </app-select>
    </app-form-field>
  </div>

  <app-form-field
    variant="outlined"
    color="primary-default"
    [labelOptions]="{
      position: 'top',
    }"
  >
    <app-input-label>Total</app-input-label>

    <input
      appInput
      id="expense-total"
      type="number"
      name="expense-total"
      placeholder="Total"
      min="0"
    />
  </app-form-field>
</form>

<div id="footer">
  <button
    type="button"
    appButton
    variant="outlined"
    color="danger"
    (click)="closeExpenseDialog($event)"
  >
    Cancel
  </button>

  <button type="button" appButton variant="contained" color="success">Add</button>
</div>
